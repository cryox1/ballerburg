<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ballerburg — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; padding: 24px; }
    h1 { color: #f0f6fc; margin-bottom: 20px; font-size: 1.3rem; letter-spacing: 1px; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; }
    .card-label { font-size: 0.72rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; }
    .card-value { font-size: 2.1rem; color: #58a6ff; font-weight: bold; margin-top: 4px; line-height: 1; }
    .card-sub { font-size: 0.72rem; color: #8b949e; margin-top: 5px; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .box { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; }
    .box-title { font-size: 0.72rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    canvas { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th { color: #8b949e; text-align: left; border-bottom: 1px solid #30363d; padding: 5px 8px; font-weight: normal; font-size: 0.72rem; text-transform: uppercase; }
    td { padding: 5px 8px; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }

    #login { max-width: 340px; margin: 100px auto; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 32px; }
    #login h2 { color: #f0f6fc; margin-bottom: 4px; font-size: 1.1rem; }
    #login p { color: #8b949e; font-size: 0.8rem; margin-bottom: 20px; }
    #login input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 9px 12px; color: #c9d1d9; font-family: inherit; font-size: 0.95rem; margin-bottom: 10px; outline: none; }
    #login input:focus { border-color: #58a6ff; }
    #login button { background: #238636; border: none; border-radius: 4px; color: #fff; padding: 9px 20px; cursor: pointer; font-family: inherit; font-size: 0.9rem; }
    #login button:hover { background: #2ea043; }
    #login-err { color: #f85149; margin-top: 8px; font-size: 0.8rem; min-height: 1.2em; }

    #status { font-size: 0.72rem; color: #8b949e; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 7px; height: 7px; background: #3fb950; border-radius: 50%; animation: blink 2s infinite; flex-shrink: 0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    #logout { font-size: 0.72rem; color: #8b949e; cursor: pointer; margin-left: auto; text-decoration: underline; }
    #logout:hover { color: #c9d1d9; }

    @media(max-width:680px){ .row2{ grid-template-columns:1fr; } }
  </style>
</head>
<body>

<div id="login" style="display:none">
  <h2>Ballerburg Admin</h2>
  <p>Enter your admin token to continue.</p>
  <input id="tok" type="password" placeholder="Admin token" autocomplete="current-password">
  <button id="login-btn">Enter</button>
  <div id="login-err"></div>
</div>

<div id="dashboard" style="display:none">
  <h1>&#9876; Ballerburg &mdash; Admin Dashboard</h1>
  <div id="status"><span class="dot"></span><span id="status-text">Loading&hellip;</span><span id="logout">Log out</span></div>

  <div class="cards" id="cards"></div>

  <div class="row2">
    <div class="box">
      <div class="box-title">Hourly Sessions &mdash; last 24 h (UTC)</div>
      <canvas id="chart-hourly"></canvas>
    </div>
    <div class="box">
      <div class="box-title">Daily Matches &mdash; last 7 days</div>
      <canvas id="chart-daily"></canvas>
    </div>
  </div>

  <div class="row2">
    <div class="box">
      <div class="box-title">Game Type Breakdown</div>
      <table id="tbl-gt"></table>
    </div>
    <div class="box">
      <div class="box-title">Top Players by Sessions</div>
      <table id="tbl-top"></table>
    </div>
  </div>

  <div class="box" style="margin-bottom:20px">
    <div class="box-title">Teams</div>
    <table id="tbl-teams"></table>
    <div id="teams-form" style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input id="new-team-name" placeholder="Team-Name" maxlength="32"
             style="flex:1;min-width:160px;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:6px 10px;color:#c9d1d9;font-family:inherit;font-size:0.85rem;outline:none">
      <input id="new-team-sort" type="number" value="0" title="Sort order"
             style="width:80px;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:6px 10px;color:#c9d1d9;font-family:inherit;font-size:0.85rem;outline:none">
      <button id="add-team-btn"
              style="background:#238636;border:none;border-radius:4px;color:#fff;padding:6px 16px;cursor:pointer;font-family:inherit;font-size:0.85rem">Hinzufügen</button>
    </div>
    <div id="teams-err" style="color:#f85149;margin-top:8px;font-size:0.78rem;min-height:1em"></div>
  </div>

  <div class="box" style="margin-bottom:20px">
    <div class="box-title">Players</div>
    <table id="tbl-players"></table>
    <div id="players-err" style="color:#f85149;margin-top:8px;font-size:0.78rem;min-height:1em"></div>
  </div>
</div>

<script>
// Untrusted strings (player/team names) are inserted via textContent or as
// option values via the DOM API — never as raw HTML. Inline event handlers
// are intentionally not used; everything wires through addEventListener.

let tok = '';
let timer = null;

// el(tag, attrs, ...children) — minimal createElement wrapper. Attributes are
// set as element properties for inputs/values (so the values aren't
// HTML-parsed) and as plain attributes otherwise; event handlers (`on…` keys
// whose value is a function) are bound with addEventListener. Children may be
// nodes or primitives — primitives are wrapped in text nodes, which is
// what makes this safe against XSS.
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === 'class') e.className = v;
      else if (k === 'style') e.setAttribute('style', v);
      else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
      else if (k === 'value' || k === 'checked' || k === 'disabled') e[k] = v;
      else e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (c instanceof Node) e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  }
  return e;
}

function clear(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

function authHeaders(extra) {
  const h = { Authorization: 'Bearer ' + tok };
  if (extra) Object.assign(h, extra);
  return h;
}

function init() {
  tok = localStorage.getItem('bb_tok') || '';
  const h = location.hash.replace('#', '');
  if (h.startsWith('token=')) {
    tok = h.slice(6);
    localStorage.setItem('bb_tok', tok);
    history.replaceState(null, '', location.pathname);
  }

  document.getElementById('login-btn').addEventListener('click', saveToken);
  document.getElementById('tok').addEventListener('keydown', e => { if (e.key === 'Enter') saveToken(); });
  document.getElementById('logout').addEventListener('click', logout);
  document.getElementById('add-team-btn').addEventListener('click', addTeam);

  if (tok) showDash(); else showLogin();
}

function showLogin() {
  document.getElementById('login').style.display = '';
  document.getElementById('dashboard').style.display = 'none';
}

function showDash() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = '';
  load();
  timer = setInterval(load, 30000);
}

function saveToken() {
  const v = document.getElementById('tok').value.trim();
  if (!v) return;
  tok = v;
  localStorage.setItem('bb_tok', tok);
  showDash();
}

function logout() {
  clearInterval(timer);
  tok = '';
  localStorage.removeItem('bb_tok');
  showLogin();
}

async function load() {
  try {
    const r = await fetch('/api/admin', { cache: 'no-store', headers: authHeaders() });
    if (r.status === 401) {
      clearInterval(timer);
      document.getElementById('login-err').textContent = 'Invalid token.';
      showLogin();
      return;
    }
    const d = await r.json();
    render(d);
    document.getElementById('status-text').textContent = 'Updated ' + new Date().toLocaleTimeString() + ' — refreshes every 30 s';
  } catch(e) {
    document.getElementById('status-text').textContent = 'Error: ' + e.message;
  }
}

const SORT_INPUT_STYLE = 'width:60px;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:3px 6px;color:#c9d1d9;font-family:inherit;font-size:0.82rem;outline:none';
const SELECT_STYLE = 'background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:3px 6px;color:#c9d1d9;font-family:inherit;font-size:0.82rem;outline:none';

function emptyRow(cols, msg) {
  return el('tr', null,
    el('td', { colspan: cols, style: 'color:#8b949e;padding:12px 8px' }, msg)
  );
}

function render(d) {
  const lv = d.live || {};

  // Stat cards
  const cards = [
    { label: 'Active Players',    value: lv.active_players ?? 0,  sub: (lv.active_lobbies ?? 0) + ' lobbies open' },
    { label: 'PvP / AI Lobbies',  value: (lv.pvp_lobbies ?? 0) + ' / ' + (lv.ai_lobbies ?? 0), sub: 'currently running' },
    { label: 'Sessions Today',    value: d.sessions_today ?? 0,   sub: (d.sessions_week ?? 0) + ' this week · ' + (d.sessions_total ?? 0) + ' total' },
    { label: 'Matches Today',     value: d.matches_today ?? 0,    sub: (d.matches_week ?? 0) + ' this week · ' + (d.matches_total ?? 0) + ' total' },
  ];
  const cardsHost = document.getElementById('cards');
  clear(cardsHost);
  for (const c of cards) {
    cardsHost.appendChild(el('div', { class: 'card' },
      el('div', { class: 'card-label' }, c.label),
      el('div', { class: 'card-value' }, String(c.value)),
      el('div', { class: 'card-sub' }, c.sub),
    ));
  }

  // Charts
  drawBars('chart-hourly',
    Array.from({length:24}, (_,i) => String(i).padStart(2,'0')+'h'),
    d.hourly_sessions || new Array(24).fill(0),
    '#58a6ff', 110
  );
  const dm = d.daily_matches || [];
  drawBars('chart-daily',
    dm.map(x => x.day.slice(5)),
    dm.map(x => x.count),
    '#3fb950', 110
  );

  // Game type table
  const gt = d.game_type_breakdown || {};
  const gtRows = Object.entries(gt).sort((a,b) => b[1]-a[1]);
  const gtTbl = document.getElementById('tbl-gt');
  clear(gtTbl);
  gtTbl.appendChild(el('tr', null, el('th', null, 'Type'), el('th', null, 'Sessions')));
  if (gtRows.length === 0) {
    gtTbl.appendChild(emptyRow(2, 'No sessions recorded yet'));
  } else {
    for (const [k, v] of gtRows) {
      gtTbl.appendChild(el('tr', null, el('td', null, k), el('td', null, String(v))));
    }
  }

  // Top players table
  const tp = d.top_players_by_sessions || [];
  const topTbl = document.getElementById('tbl-top');
  clear(topTbl);
  topTbl.appendChild(el('tr', null, el('th', null, '#'), el('th', null, 'Player'), el('th', null, 'Sessions')));
  if (tp.length === 0) {
    topTbl.appendChild(emptyRow(3, 'No sessions recorded yet'));
  } else {
    tp.forEach((p, i) => {
      topTbl.appendChild(el('tr', null,
        el('td', null, String(i + 1)),
        el('td', null, p.name),
        el('td', null, String(p.count)),
      ));
    });
  }

  // Teams table — sort cell is an inline editable input; commits on Enter or blur.
  const teams = d.teams || [];
  const teamsTbl = document.getElementById('tbl-teams');
  clear(teamsTbl);
  teamsTbl.appendChild(el('tr', null,
    el('th', null, 'Name'),
    el('th', { style: 'width:90px' }, 'Sort'),
    el('th', { style: 'width:200px' }, 'Aktion'),
  ));
  if (teams.length === 0) {
    teamsTbl.appendChild(emptyRow(3, 'Keine Teams'));
  } else {
    for (const t of teams) {
      const sortInput = el('input', {
        type: 'number',
        value: String(t.sort_order),
        style: SORT_INPUT_STYLE,
        onchange: () => saveSort(t.name, t.sort_order, sortInput),
        onkeydown: e => { if (e.key === 'Enter') sortInput.blur(); },
      });
      const renameLink = el('a', { href: '#', style: 'color:#58a6ff;margin-right:10px',
        onclick: e => { e.preventDefault(); renameTeam(t.name); } }, 'Umbenennen');
      const deleteLink = el('a', { href: '#', style: 'color:#f85149',
        onclick: e => { e.preventDefault(); deleteTeam(t.name); } }, 'Löschen');
      teamsTbl.appendChild(el('tr', null,
        el('td', null, t.name),
        el('td', null, sortInput),
        el('td', null, renameLink, deleteLink),
      ));
    }
  }

  // Players table — team is a dropdown that commits on change.
  const players = d.players || [];
  const playersTbl = document.getElementById('tbl-players');
  clear(playersTbl);
  playersTbl.appendChild(el('tr', null,
    el('th', null, 'Name'),
    el('th', { style: 'width:200px' }, 'Team'),
    el('th', { style: 'width:50px' }, 'W'),
    el('th', { style: 'width:50px' }, 'L'),
    el('th', { style: 'width:150px' }, 'Letztes Spiel'),
    el('th', { style: 'width:200px' }, 'Aktion'),
  ));
  if (players.length === 0) {
    playersTbl.appendChild(emptyRow(6, 'Keine Spieler'));
  } else {
    for (const p of players) {
      const teamKnown = teams.some(t => t.name === p.team);
      const select = el('select', {
        style: SELECT_STYLE,
        onchange: () => savePlayerTeam(p.name, p.team, select),
      });
      if (!teamKnown) {
        select.appendChild(el('option', { value: p.team }, p.team + ' (?)'));
      }
      for (const t of teams) {
        select.appendChild(el('option', { value: t.name }, t.name));
      }
      select.value = p.team;

      const lastNode = p.last_played
        ? document.createTextNode(p.last_played.slice(0, 16).replace('T', ' '))
        : el('span', { style: 'color:#8b949e' }, '—');

      const renameLink = el('a', { href: '#', style: 'color:#58a6ff;margin-right:10px',
        onclick: e => { e.preventDefault(); renamePlayer(p.name); } }, 'Umbenennen');
      const deleteLink = el('a', { href: '#', style: 'color:#f85149',
        onclick: e => { e.preventDefault(); deletePlayer(p.name); } }, 'Löschen');

      playersTbl.appendChild(el('tr', null,
        el('td', null, p.name),
        el('td', null, select),
        el('td', null, String(p.wins)),
        el('td', null, String(p.losses)),
        el('td', null, lastNode),
        el('td', null, renameLink, deleteLink),
      ));
    }
  }
}

function saveSort(name, orig, inputEl) {
  const next = parseInt(inputEl.value, 10);
  if (isNaN(next) || next === orig) {
    inputEl.value = orig;
    return;
  }
  teamsMutate('PATCH', { old_name: name, sort_order: next });
}

function teamsErr(msg) {
  document.getElementById('teams-err').textContent = msg || '';
}

async function teamsMutate(method, body) {
  teamsErr('');
  try {
    const r = await fetch('/api/admin/teams', {
      method,
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      let msg = 'HTTP ' + r.status;
      try {
        const j = await r.json();
        if (j && j.error) msg = j.error;
      } catch (_) {}
      teamsErr(msg);
      return false;
    }
    load();
    return true;
  } catch (e) {
    teamsErr(e.message);
    return false;
  }
}

function addTeam() {
  const name = document.getElementById('new-team-name').value.trim();
  if (!name) { teamsErr('Bitte Name eingeben.'); return; }
  const sort = parseInt(document.getElementById('new-team-sort').value, 10) || 0;
  teamsMutate('POST', { name, sort_order: sort }).then(ok => {
    if (ok) {
      document.getElementById('new-team-name').value = '';
    }
  });
}

function renameTeam(oldName) {
  const newName = prompt('Neuer Name für "' + oldName + '":', oldName);
  if (newName == null) return;
  const trimmed = newName.trim();
  if (!trimmed || trimmed === oldName) return;
  teamsMutate('PATCH', { old_name: oldName, new_name: trimmed });
}

function deleteTeam(name) {
  if (!confirm('Team "' + name + '" wirklich löschen?\n(Nur möglich, wenn keine Spieler/Spiele zugewiesen sind.)')) return;
  teamsMutate('DELETE', { name });
}

function playersErr(msg) {
  document.getElementById('players-err').textContent = msg || '';
}

async function playersMutate(method, body) {
  playersErr('');
  try {
    const r = await fetch('/api/admin/players', {
      method,
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      let msg = 'HTTP ' + r.status;
      try {
        const j = await r.json();
        if (j && j.error) msg = j.error;
      } catch (_) {}
      playersErr(msg);
      return false;
    }
    load();
    return true;
  } catch (e) {
    playersErr(e.message);
    return false;
  }
}

function savePlayerTeam(name, orig, selectEl) {
  const next = selectEl.value;
  if (next === orig) return;
  playersMutate('PATCH', { old_name: name, team: next });
}

function renamePlayer(oldName) {
  const newName = prompt('Neuer Name für "' + oldName + '":', oldName);
  if (newName == null) return;
  const trimmed = newName.trim();
  if (!trimmed || trimmed === oldName) return;
  playersMutate('PATCH', { old_name: oldName, new_name: trimmed });
}

function deletePlayer(name) {
  if (!confirm('Spieler "' + name + '" wirklich löschen?\nAlle Spiele, Sessions und KI-Partien werden ebenfalls entfernt.')) return;
  playersMutate('DELETE', { name });
}

function drawBars(id, labels, values, color, h) {
  const canvas = document.getElementById(id);
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 32;
  if (W <= 0) return;
  canvas.width = W * dpr;
  canvas.height = h * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const max = Math.max(...values, 1);
  const n = labels.length;
  const pL = 28, pR = 4, pT = 6, pB = 22;
  const bw = (W - pL - pR) / n;

  ctx.clearRect(0, 0, W, h);

  // Grid lines + Y labels
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#8b949e';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 3; i++) {
    const y = pT + (h - pT - pB) * (1 - i/3);
    ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(W - pR, y); ctx.stroke();
    ctx.fillText(Math.round(max * i / 3), pL - 3, y + 3);
  }

  // Bars
  ctx.fillStyle = color;
  for (let i = 0; i < n; i++) {
    const bh = (values[i] / max) * (h - pT - pB);
    if (bh < 1) continue;
    ctx.fillRect(pL + i * bw + 1, pT + (h - pT - pB) - bh, bw - 2, bh);
  }

  // X labels (sparse)
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'center';
  const step = Math.ceil(n / 8);
  for (let i = 0; i < n; i += step) {
    ctx.fillText(labels[i], pL + (i + 0.5) * bw, h - pB + 13);
  }
}

init();
</script>
</body>
</html>
